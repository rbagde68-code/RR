<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to my Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        #video-bg {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -2;
        }

        .video-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }
        
        .main-content {
            height: 100vh; display: flex;
            justify-content: center; align-items: center;
        }

        .welcome-container {
            padding: 40px; text-align: center; width: 400px;
            
            /* Background is now more transparent to see the clear video */
            background: rgba(20, 20, 20, 0.6); 
            
            /* === BLUR EFFECT REMOVED FROM HERE === */
            /* backdrop-filter: blur(10px); */

            border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        h2 { 
            font-weight: 500; 
            font-size: 28px; 
            margin-bottom: 10px; 
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p.owner-name {
            font-size: 20px;
            font-weight: 300;
            color: #ccc;
            margin-top: 0;
            margin-bottom: 30px;
        }

        button {
            width: 100%; padding: 12px; background: #00aaff; color: white;
            border: none; border-radius: 8px; cursor: pointer; font-size: 18px;
            font-weight: 500; font-family: 'Poppins', sans-serif; transition: all 0.3s ease;
            text-transform: uppercase;
        }

        button:hover {
            background: #0077cc;
            box-shadow: 0 4px 15px rgba(0, 170, 255, 0.5);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <video autoplay muted loop id="video-bg">
        <source src="background-video.mp4" type="video/mp4">
    </video>

    <div class="video-overlay"></div>

    <div class="main-content">
        <div class="welcome-container">
            <h2>Welcome To Portfolio</h2>
            <p class="owner-name">Rishabh Bagde</p>
            
            <form id="enterForm">
                <button type="submit">Enter</button>
            </form>

        </div>
    </div>

    <script>
        const enterForm = document.getElementById('enterForm');

        enterForm.addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            window.location.href = 'portfolio.html';
        });
    </script>

</body>
</html>
